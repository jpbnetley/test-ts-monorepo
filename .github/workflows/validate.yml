name: Validate

on:
  workflow_dispatch:

  pull_request:
    branches: ['main']

env:
  node_version: 24

jobs:
  Tests:
    name: Check Typescript
    runs-on: ubuntu-latest
    permissions: {}

    steps:
      - uses: actions/checkout@v6
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: ${{ env.node_version }}

      - name: Build lib
        run: vp run vp:build:packages

      - name: Check
        run: vp check
